spring:
  application:
    name: wms

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wms}
    username: ${SPRING_DATASOURCE_USERNAME:wms}
    password: ${SPRING_DATASOURCE_PASSWORD:wms}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  # JWT / OAuth2 Resource Server — active when WMS_JWT_ISSUER_URI / WMS_JWT_JWK_SET_URI are set.
  # Both properties must be configured together:
  #   issuer-uri  — the public URL embedded as `iss` in Keycloak tokens (claim validation only, no OIDC discovery)
  #   jwk-set-uri — where to fetch public signing keys (uses Docker-internal hostname in Compose)
  # Defaults work when running the backend locally with Keycloak exposed on localhost:9090.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${WMS_JWT_ISSUER_URI:http://localhost:9090/realms/wms}
          jwk-set-uri: ${WMS_JWT_JWK_SET_URI:http://localhost:9090/realms/wms/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info

wms:
  cors:
    allowed-origins: ${WMS_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    admin:
      username: ${WMS_ADMIN_USERNAME}
      password: ${WMS_ADMIN_PASSWORD}
    employees:
      - username: jan.kowalski
        password: ${WMS_EMPLOYEE_PASSWORD}
      - username: anna.nowak
        password: ${WMS_EMPLOYEE_PASSWORD}
