services:

  postgres:
    image: postgres:16
    container_name: wms-postgres
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms
    ports:
      - "5432:5432"
    volumes:
      - wms_postgres_data:/var/lib/postgresql/data
    networks:
      - wms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms"]
      interval: 5s
      timeout: 5s
      retries: 5

  wms-backend:
    build: .
    container_name: wms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wms
      SPRING_DATASOURCE_USERNAME: wms
      SPRING_DATASOURCE_PASSWORD: wms
      WMS_ADMIN_USERNAME: ${WMS_ADMIN_USERNAME}
      WMS_ADMIN_PASSWORD: ${WMS_ADMIN_PASSWORD}
      WMS_EMPLOYEE_PASSWORD: ${WMS_EMPLOYEE_PASSWORD}
      WMS_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wms-net

networks:
  wms-net:

volumes:
  wms_postgres_data:
