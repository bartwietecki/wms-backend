services:

  postgres:
    image: postgres:16
    container_name: wms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wms}
      POSTGRES_USER: ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - wms_postgres_data:/var/lib/postgresql/data
    networks:
      - wms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: wms-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL:-http://localhost:9090}
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    ports:
      - "9090:8080"
    networks:
      - wms-net
    healthcheck:
      # curl/wget are not present in this image - use bash's /dev/tcp to send a raw HTTP request.
      test: ["CMD-SHELL", 'exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && timeout 5 head -1 <&3 | grep -q "200"']
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  wms-backend:
    build: .
    container_name: wms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-wms}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-wms}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      WMS_ADMIN_USERNAME: ${WMS_ADMIN_USERNAME}
      WMS_ADMIN_PASSWORD: ${WMS_ADMIN_PASSWORD}
      WMS_EMPLOYEE_PASSWORD: ${WMS_EMPLOYEE_PASSWORD}
      WMS_CORS_ALLOWED_ORIGINS: ${WMS_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      WMS_JWT_ISSUER_URI: ${WMS_JWT_ISSUER_URI:-http://localhost:9090/realms/wms}
      WMS_JWT_JWK_SET_URI: ${WMS_JWT_JWK_SET_URI:-http://keycloak:8080/realms/wms/protocol/openid-connect/certs}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - wms-net

  wms-frontend:
    build:
      context: ../wms-frontend
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:9090}
    container_name: wms-frontend
    ports:
      - "3000:80"
    depends_on:
      - wms-backend
    networks:
      - wms-net

networks:
  wms-net:

volumes:
  wms_postgres_data:
