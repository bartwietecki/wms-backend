services:

  postgres:
    image: postgres:16
    container_name: wms-postgres
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: wms
      POSTGRES_PASSWORD: wms
    ports:
      - "5432:5432"
    volumes:
      - wms_postgres_data:/var/lib/postgresql/data
    networks:
      - wms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wms"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: wms-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_URL: http://localhost:9090
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    ports:
      - "9090:8080"
    networks:
      - wms-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10

  wms-backend:
    build: .
    container_name: wms-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wms
      SPRING_DATASOURCE_USERNAME: wms
      SPRING_DATASOURCE_PASSWORD: wms
      WMS_ADMIN_USERNAME: ${WMS_ADMIN_USERNAME}
      WMS_ADMIN_PASSWORD: ${WMS_ADMIN_PASSWORD}
      WMS_EMPLOYEE_PASSWORD: ${WMS_EMPLOYEE_PASSWORD}
      WMS_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      WMS_JWT_ISSUER_URI: http://localhost:9090/realms/wms
      WMS_JWT_JWK_SET_URI: http://keycloak:8080/realms/wms/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - wms-net

  wms-frontend:
    build: ../wms-frontend
    container_name: wms-frontend
    ports:
      - "3000:80"
    depends_on:
      - wms-backend
    networks:
      - wms-net

networks:
  wms-net:

volumes:
  wms_postgres_data:
